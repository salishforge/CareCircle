version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: carecircle-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: carecircle
      POSTGRES_PASSWORD: carecircle_dev
      POSTGRES_DB: carecircle
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
